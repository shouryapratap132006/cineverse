# Run-only compose for the 1 GB EC2 host.
# Uses images built on your Mac and shipped over SSH (see scripts/deploy.sh).
# The host NEVER builds — it only loads and runs the images (fits in 1 GB RAM).
# scripts/deploy.sh copies this file to the host as docker-compose.yml.

services:
  migrate:
    image: cineverse:migrate
    pull_policy: never          # image is loaded via `docker load`, not pulled
    env_file: .env
    command: npx prisma migrate deploy
    restart: "no"

  app:
    image: cineverse:latest
    pull_policy: never
    env_file: .env
    expose:
      - "3000"                 # internal only — reached by caddy, not published to the host
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Reverse proxy: serves 80/443, auto-HTTPS when SITE_ADDRESS is a domain.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
