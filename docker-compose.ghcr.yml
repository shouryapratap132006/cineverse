# Registry-based run file for the EC2 host (CD path).
# deploy.yml ships this to the host as docker-compose.yml and exports APP_IMAGE / MIGRATE_IMAGE
# (the GHCR refs for the commit being deployed). SITE_ADDRESS + runtime secrets come from ./.env.

services:
  migrate:
    image: ${MIGRATE_IMAGE:?set MIGRATE_IMAGE}
    pull_policy: always
    env_file: .env
    command: npx prisma migrate deploy
    restart: "no"

  app:
    image: ${APP_IMAGE:?set APP_IMAGE}
    pull_policy: always
    env_file: .env
    expose:
      - "3000"                 # internal only — reached by caddy
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
