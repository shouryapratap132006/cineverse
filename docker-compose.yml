# Build + run on the EC2 host directly:  docker compose up -d --build
# Migrations run first (via the `builder` stage, which has the Prisma CLR),
# then the app starts once they complete successfully.

services:
  # Runs `prisma migrate deploy` against your DATABASE_URL, then exits.
  migrate:
    build:
      context: .
      target: migrator         # lightweight Prisma-only stage (no heavy Next build)
    env_file: .env
    command: npx prisma migrate deploy
    restart: "no"

  app:
    build:
      context: .               # defaults to the final `runner` stage
      args:                    # NEXT_PUBLIC_* are inlined at build time; compose reads them from ./.env
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER}
        NEXT_PUBLIC_TMDB_API_KEY: ${NEXT_PUBLIC_TMDB_API_KEY}
        DATABASE_URL: ${DATABASE_URL}
    image: cineverse:latest
    env_file: .env
    expose:
      - "3000"                 # internal only — reached by caddy, not published to the host
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Reverse proxy: serves 80/443, auto-HTTPS when SITE_ADDRESS is a domain.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
