name: Docker build

# Validates that the production image builds for the EC2 target arch (linux/amd64)
# on every push/PR. It does NOT push anywhere — you build on the EC2 host itself.
# To publish to a registry later, see the commented ECR block at the bottom.

on:
  push:
    branches: [main, docker-ec2-deploy]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: cineverse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Optional: push to Amazon ECR ---
